<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vibhillion AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d0f14;--sur:#161920;--sur2:#1e2230;--sur3:#252a3a;--bor:#2a2f42;--bor2:#353b52;--txt:#e8eaf2;--txt2:#9097b0;--txt3:#5c6480;--acc:#5b7bff;--acc2:#3d5ce8;--grn:#2ecc8a;--amb:#f5a623;--red:#ff5f6a;--pur:#a78bfa;--pnk:#f472b6;--r:10px;--r2:14px;--f:'DM Sans',sans-serif;--f2:'Space Grotesk',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--f);min-height:100vh;display:flex}
/* AUTH */
#as{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.ab{background:var(--sur);border:1px solid var(--bor2);border-radius:20px;padding:36px;width:100%;max-width:360px}
.al{text-align:center;margin-bottom:28px}
.al h1{font-family:var(--f2);font-size:26px;font-weight:700;color:var(--acc);margin-bottom:4px}
.al p{font-size:13px;color:var(--txt3)}
.fg{margin-bottom:14px}
.fl{font-size:11px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:6px}
.fi{width:100%;background:var(--sur2);border:1px solid var(--bor2);border-radius:8px;padding:11px 13px;color:var(--txt);font-size:14px;font-family:var(--f);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--acc)}
.fs{width:100%;background:var(--sur2);border:1px solid var(--bor2);border-radius:8px;padding:10px 12px;color:var(--txt);font-size:14px;font-family:var(--f);outline:none;appearance:none;cursor:pointer}
.abtn{width:100%;padding:12px;border-radius:9px;background:var(--acc);color:#fff;font-size:15px;font-weight:600;font-family:var(--f);border:none;cursor:pointer;transition:background .15s}
.abtn:hover{background:var(--acc2)}
.aerr{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:16px}
/* SIDEBAR */
#sb{width:255px;min-width:255px;background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--bor)}
.logo h1{font-family:var(--f2);font-size:17px;font-weight:700;color:var(--acc)}
.logo span{font-size:11px;color:var(--txt3);display:block;margin-top:1px}
.sc{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--sur2);border-radius:8px;margin:10px;font-size:11px;color:var(--txt3)}
.sd{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0}
.sd.sy{background:var(--amb);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ns{padding:8px 10px 0}
.nl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;padding:8px 8px 4px;font-weight:600}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13.5px;color:var(--txt2);transition:all .15s;margin-bottom:1px;border:1px solid transparent}
.ni:hover{background:var(--sur2);color:var(--txt)}
.ni.act{background:rgba(91,123,255,.12);color:var(--acc);border-color:rgba(91,123,255,.25)}
.ni svg{width:16px;height:16px;flex-shrink:0}
.bdg{margin-left:auto;background:var(--amb);color:#000;font-size:10px;border-radius:20px;padding:2px 7px;font-weight:600}
.ti{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--txt2);transition:all .15s}
.ti:hover{background:var(--sur2);color:var(--txt)}
.ti.i1{padding-left:22px}.ti.i2{padding-left:36px}
.tc{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.tc.op{transform:rotate(90deg)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--grn)}.dot.a{background:var(--amb)}.dot.x{background:var(--txt3)}
/* MAIN */
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{background:var(--sur);border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:12px;padding:14px 24px;position:sticky;top:0;z-index:10}
#tb h2{font-family:var(--f2);font-size:16px;font-weight:600;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bor2);background:var(--sur2);color:var(--txt);transition:all .15s;font-family:var(--f)}
.btn:hover{background:var(--sur3);border-color:var(--acc);color:var(--acc)}
.btn.p{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn.p:hover{background:var(--acc2)}
.btn.r{color:var(--red);border-color:rgba(255,95,106,.3)}
.btn.g{color:var(--grn);border-color:rgba(46,204,138,.3)}
#ct{flex:1;overflow-y:auto;padding:24px}
/* CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.sc2{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r2);padding:16px 18px;position:relative;overflow:hidden}
.sc2::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc2.b::before{background:var(--acc)}.sc2.g::before{background:var(--grn)}.sc2.a::before{background:var(--amb)}.sc2.r::before{background:var(--red)}.sc2.p::before{background:var(--pur)}
.sl{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:8px}
.sv{font-family:var(--f2);font-size:28px;font-weight:700}
.ss{font-size:12px;color:var(--txt3);margin-top:4px}
.st{font-family:var(--f2);font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.st span{font-family:var(--f);font-size:12px;color:var(--txt3);font-weight:400}
.pb{background:var(--sur3);border-radius:99px;height:6px;overflow:hidden}
.pf{height:100%;border-radius:99px;transition:width .5s}
.pf.g{background:var(--grn)}.pf.a{background:var(--acc)}
/* TABLE */
.dt{width:100%;border-collapse:collapse}
.dt th{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;font-weight:600;padding:8px 12px;text-align:left;border-bottom:1px solid var(--bor)}
.dt td{padding:10px 12px;font-size:13.5px;border-bottom:1px solid var(--bor);vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:var(--sur2)}
.tg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.tg.dn{background:rgba(46,204,138,.15);color:var(--grn)}.tg.pd{background:rgba(245,166,35,.15);color:var(--amb)}.tg.ip{background:rgba(91,123,255,.15);color:var(--acc)}.tg.ns2{background:rgba(92,100,128,.15);color:var(--txt3)}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.mb{background:var(--sur);border:1px solid var(--bor2);border-radius:var(--r2);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:24px}
.mb h3{font-family:var(--f2);font-size:17px;font-weight:600;margin-bottom:20px}
.fr{display:flex;gap:12px}.fr .fg{flex:1}
.mf{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--bor)}
/* PILLS */
.pr{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
.pl{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid;cursor:pointer;transition:all .15s}
.pl.nt{border-color:rgba(91,123,255,.4);color:var(--acc);background:rgba(91,123,255,.08)}
.pl.ol{border-color:rgba(46,204,138,.4);color:var(--grn);background:rgba(46,204,138,.08)}
.pl.mm{border-color:rgba(167,139,250,.4);color:var(--pur);background:rgba(167,139,250,.08)}
.pl.mq{border-color:rgba(245,166,35,.4);color:var(--amb);background:rgba(245,166,35,.08)}
.pl.vd{border-color:rgba(244,114,182,.4);color:var(--pnk);background:rgba(244,114,182,.08)}
.pl.act2{filter:brightness(1.3);box-shadow:0 0 0 2px currentColor}
/* FILE */
.fp{background:#0a0c10;border:1px solid var(--bor);border-radius:var(--r2);padding:16px;font-family:monospace;font-size:12px;overflow:auto;max-height:480px;color:#b8c4e0;white-space:pre-wrap;word-break:break-all}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--sur2);border:1px solid var(--grn);border-radius:var(--r2);padding:12px 18px;font-size:14px;color:var(--grn);z-index:999;display:flex;align-items:center;gap:8px;animation:su .3s ease;box-shadow:0 4px 24px rgba(0,0,0,.4)}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
/* BANNER */
.bn{background:linear-gradient(135deg,rgba(91,123,255,.12),rgba(167,139,250,.08));border:1px solid rgba(91,123,255,.25);border-radius:var(--r2);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
/* SEARCH */
.sx{display:flex;align-items:center;gap:8px;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:8px 12px;margin-bottom:18px}
.sx input{background:none;border:none;outline:none;color:var(--txt);font-size:14px;flex:1;font-family:var(--f)}
/* LOG */
.le{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px}
/* MOBILE */
#mb2{display:none;background:var(--sur);border-top:1px solid var(--bor);position:fixed;bottom:0;left:0;right:0;padding:8px 0 14px;z-index:50}
.mn2{display:flex;justify-content:space-around}
.mb3{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;color:var(--txt3);font-size:10px;border:none;background:none;font-family:var(--f);transition:color .15s}
.mb3.act{color:var(--acc)}
.mb3 svg{width:22px;height:22px}
#sbt{display:none;background:none;border:none;color:var(--txt2);cursor:pointer;padding:4px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bor2);border-radius:99px}
@media(max-width:768px){
  #sb{position:fixed;left:-255px;z-index:100;transition:left .3s;height:100vh}
  #sb.op{left:0}
  #sbt{display:flex}
  #mb2{display:block}
  #mn{padding-bottom:70px}
  #ct{padding:14px}
  .sg{grid-template-columns:repeat(2,1fr)}
  #tb{padding:12px 14px}
  .fr{flex-direction:column}
  .bn .bn-stats{display:none}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="as">
  <div class="ab">
    <div class="al">
      <h1>Vibhillion AI</h1>
      <p>Private workspace</p>
    </div>
    <div class="fg">
      <label class="fl">Password</label>
      <div style="position:relative">
        <input class="fi" type="password" id="ap" placeholder="Enter password" style="padding-right:44px" autocomplete="current-password">
        <button id="eye" onclick="toggleEye()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px">&#128065;</button>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <input type="checkbox" id="rem" checked style="width:14px;height:14px;cursor:pointer;accent-color:var(--acc)">

    <button class="abtn" id="lbtn" onclick="doLogin()">Login to Vibhillion</button>
    <div id="aerr" class="aerr"></div>
    <p style="text-align:center;font-size:11px;color:var(--txt3);margin-top:14px">All devices sync automatically</p>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sb">
  <div class="logo"><h1>Vibhillion AI</h1><span>Project Manager</span></div>
  <div class="sc">
    <div class="sd" id="sdot"></div>
    <span id="slbl" style="flex:1">Ready</span>
    <button onclick="syncNow()" style="background:none;border:none;color:var(--acc);font-size:11px;cursor:pointer;font-family:var(--f)">Sync</button>

  <div class="ns">
    <div class="nl">Navigation</div>
    <div class="ni act" onclick="go('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard
    </div>
    <div class="ni" onclick="go('daily')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Daily Tracker
      <span class="bdg" id="pb" style="display:none">0</span>
    </div>
    <div class="ni" onclick="go('files')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>My Files
    </div>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload Pending
    </div>
    <div class="ni" onclick="go('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search
    </div>
  </div>
  <div class="ns" style="margin-top:8px">
    <div class="nl">Vibhi Data</div>
    <div id="tr" style="padding:4px 10px"></div>
  </div>
  <div style="margin-top:auto;padding:10px">
    <div class="ni" onclick="go('settings')" style="margin-bottom:8px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3"/></svg>Settings
    </div>
    <button class="btn p" style="width:100%;justify-content:center" onclick="openAdd()">+ Add Chapter</button>
  </div>
</div>

<!-- MAIN -->
<div id="mn">
  <div id="tb">
    <button id="sbt" onclick="document.getElementById('sb').classList.toggle('op')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h2 id="pt">Dashboard</h2>
    <button class="btn p" onclick="openAdd()">+ Add</button>
  </div>
  <div id="ct"><div style="text-align:center;padding:60px;color:var(--txt3)">Loading...</div></div>
</div>

<div id="ov" style="display:none" class="mo" onclick="if(event.target===this)closeM()">
  <div class="mb" id="mb"></div>
</div>
<div id="toast" class="toast" style="display:none"></div>

<div id="mb2">
  <div class="mn2">
    <button class="mb3 act" onclick="go('dashboard');ma(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Home</button>
    <button class="mb3" onclick="go('daily');ma(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Daily</button>
    <button class="mb3" onclick="openAdd()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Add</button>
    <button class="mb3" onclick="go('files');ma(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>Files</button>
    <button class="mb3" onclick="go('settings');ma(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3"/></svg>Settings</button>
  </div>
</div>

<script>
var CFG = {
  pass: 'Vibhi@2024',
  url:  'https://umjyicamlvtbzfeviwvu.supabase.co',
  key:  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtanlpY2FtbHZ0YnpmZXZpd3Z1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMDcxMDgsImV4cCI6MjA5NTc4MzEwOH0.2ePQhjmFXNyAAwV0WKLtmggHjo89-ZBi12femMiz9yo'
};
var SK = 'vib_sess', UK = 'vib_uid', BK = 'vib_bk';
var sb = supabase.createClient(CFG.url, CFG.key);
var D = null, page = 'dashboard', TS = {}, uid = null, PF = null;

// ── UTILS ──
function td() { return new Date().toISOString().split('T')[0]; }
function fd(d) { return d ? new Date(d + 'T00:00:00').toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'}) : '—'; }
function gid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function pct(a,b) { return b ? Math.round((a/b)*100) : 0; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ma(el) { document.querySelectorAll('.mb3').forEach(function(b){b.classList.remove('act');}); el.classList.add('act'); }
function syn(v,m) {
  var d = document.getElementById('sdot'), l = document.getElementById('slbl');
  if(d) d.className = v ? 'sd sy' : 'sd';
  if(l) l.textContent = m || (v ? 'Saving...' : 'Saved');
}

// ── DEFAULT DATA ──
function defData() {
  return {
    folders:[
      {id:'upsc',name:'UPSC',icon:'U'},
      {id:'appsc',name:'APPSC',icon:'A'},
      {id:'tgpsc',name:'TGPSC',icon:'T'},
      {id:'ssc',name:'SSC',icon:'S'}
    ],
    subfolders:[
      {id:'upsc-syl',parentId:'upsc',name:'Syllabus'},
      {id:'upsc-fnd',parentId:'upsc',name:'Foundation Course'},
      {id:'appsc-syl',parentId:'appsc',name:'Syllabus'},
      {id:'appsc-fnd',parentId:'appsc',name:'Foundation Course'}
    ],
    subjects:[
      {id:'history',sfId:'upsc-fnd',name:'Indian History',icon:'H',total:20},
      {id:'polity',sfId:'upsc-fnd',name:'Indian Polity',icon:'P',total:18},
      {id:'geo',sfId:'upsc-fnd',name:'Geography',icon:'G',total:15},
      {id:'eco',sfId:'upsc-fnd',name:'Economics',icon:'E',total:12},
      {id:'env',sfId:'upsc-fnd',name:'Environment',icon:'V',total:10}
    ],
    chapters:[],
    logs:[]
  };
}

// ── AUTH ──
var fc = 0, lu = 0;

function toggleEye() {
  var inp = document.getElementById('ap');
  var btn = document.getElementById('eye');
  if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '&#128584;'; }
  else { inp.type = 'password'; btn.innerHTML = '&#128065;'; }
}

function doLogin() {
  if (Date.now() < lu) {
    document.getElementById('aerr').textContent = 'Too many attempts. Wait ' + Math.ceil((lu - Date.now()) / 1000) + 's';
    return;
  }
  var p = document.getElementById('ap').value;
  if (p !== CFG.pass) {
    fc++;
    if (fc >= 5) { lu = Date.now() + 120000; fc = 0; }
    document.getElementById('aerr').textContent = 'Wrong password!';
    document.getElementById('ap').value = '';
    return;
  }
  fc = 0;
  var btn = document.getElementById('lbtn');
  btn.textContent = 'Connecting...';
  btn.disabled = true;
  if (document.getElementById('rem').checked) localStorage.setItem(SK, 'on');
  startSession().then(function() {
    document.getElementById('as').style.display = 'none';
    btn.textContent = 'Login to Vibhillion';
    btn.disabled = false;
    loadData();
  }).catch(function() {
    btn.textContent = 'Login to Vibhillion';
    btn.disabled = false;
    document.getElementById('as').style.display = 'none';
    uid = 'local';
    D = defData();
    initUI();
  });
}

function startSession() {
  return sb.auth.getSession().then(function(r) {
    if (r.data && r.data.session && r.data.session.user) {
      uid = r.data.session.user.id;
      localStorage.setItem(UK, uid);
      return;
    }
    return sb.auth.signInAnonymously().then(function(r2) {
      if (r2.data && r2.data.user) {
        uid = r2.data.user.id;
        localStorage.setItem(UK, uid);
      } else {
        uid = localStorage.getItem(UK) || 'local_' + Date.now();
        localStorage.setItem(UK, uid);
      }
    });
  });
}

function doLogout() {
  if (!confirm('Logout?')) return;
  localStorage.removeItem(SK);
  sb.auth.signOut();
  document.getElementById('as').style.display = 'flex';
  document.getElementById('ap').value = '';
}

// Auto-login check
window.onload = function() {
  if (localStorage.getItem(SK) === 'on') {
    document.getElementById('as').style.display = 'none';
    startSession().then(loadData).catch(function() {
      uid = localStorage.getItem(UK) || 'local';
      D = defData();
      initUI();
    });
  }
};

// ── SUPABASE DATA ──
function loadData() {
  syn(true, 'Loading...');
  sb.from('app_config').select('data').eq('id', 'main').eq('user_id', uid).then(function(r) {
    syn(false);
    if (r.error || !r.data || !r.data.length) {
      D = defData();
      saveData();
    } else {
      D = r.data[0].data;
      if (!D.logs) D.logs = [];
      if (!D.chapters) D.chapters = [];
      if (!D.subjects) D.subjects = [];
      if (!D.folders) D.folders = defData().folders;
      if (!D.subfolders) D.subfolders = defData().subfolders;
    }
    initUI();
  }).catch(function() {
    syn(false, 'Error');
    D = defData();
    initUI();
  });
}

function saveData() {
  if (!D || !uid) return;
  syn(true);
  sb.from('app_config').upsert({id:'main', user_id:uid, data:D, updated_at:new Date().toISOString()}, {onConflict:'id,user_id'}).then(function(r) {
    if (r.error) syn(false, 'Error!');
    else { syn(false, 'Saved'); updateBadge(); buildTree(); }
  }).catch(function() { syn(false, 'Failed'); });
}

function syncNow() { saveData(); showToast('Synced!'); }

// ── INIT ──
function initUI() { buildTree(); updateBadge(); renderDash(); }
function updateBadge() {
  if (!D) return;
  var p = D.chapters.filter(function(c){ return c.status !== 'done'; }).length;
  var el = document.getElementById('pb');
  if (el) { el.textContent = p; el.style.display = p ? '' : 'none'; }
}

function getFN(sid) {
  var s = D.subjects.find(function(x){ return x.id === sid; });
  if (!s) return '—';
  var sf = D.subfolders.find(function(f){ return f.id === s.sfId; });
  if (!sf) return '—';
  var f = D.folders.find(function(f2){ return f2.id === sf.parentId; });
  return f ? f.name : '—';
}

// ── TREE ──
function buildTree() {
  if (!D) return;
  D.folders.forEach(function(f){ if (TS[f.id] === undefined) TS[f.id] = true; });
  D.subfolders.forEach(function(sf){ if (TS[sf.id] === undefined) TS[sf.id] = true; });
  var root = document.getElementById('tr'), html = '';
  D.folders.forEach(function(f) {
    var op = TS[f.id] !== false;
    var subs = D.subfolders.filter(function(s){ return s.parentId === f.id; });
    html += '<div class="ti" onclick="tt(\'' + f.id + '\',event)">'
      + '<svg class="tc ' + (op?'op':'') + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>'
      + '<span style="font-size:13px;font-weight:600">' + f.name + '</span></div>';
    if (op) {
      subs.forEach(function(sf) {
        var so = TS[sf.id] !== false;
        var subjs = D.subjects.filter(function(s){ return s.sfId === sf.id; });
        html += '<div class="ti i1" onclick="tt(\'' + sf.id + '\',event)">'
          + '<svg class="tc ' + (so?'op':'') + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>'
          + '<span style="font-size:12.5px">' + sf.name + '</span></div>';
        if (so) {
          subjs.forEach(function(s) {
            var done = D.chapters.filter(function(c){ return c.sid === s.id && c.status === 'done'; }).length;
            var dc = done === s.total ? 'g' : done > 0 ? 'a' : 'x';
            html += '<div class="ti i2" onclick="goSubj(\'' + s.id + '\',event)">'
              + '<span class="dot ' + dc + '"></span>'
              + '<span style="flex:1;font-size:12px">' + s.name + '</span>'
              + '<span style="font-size:10px;color:var(--txt3)">' + done + '/' + s.total + '</span></div>';
          });
        }
      });
    }
  });
  root.innerHTML = html;
}

function tt(id, e) { e.stopPropagation(); TS[id] = TS[id] === false ? true : false; buildTree(); }
function goSubj(id, e) { if(e) e.stopPropagation(); var s = D.subjects.find(function(x){return x.id===id;}); if(s) go('subj-'+id, s.name); }

// ── NAV ──
function go(p, title) {
  page = p;
  document.getElementById('pt').textContent = title || (p.charAt(0).toUpperCase() + p.slice(1));
  if (p === 'dashboard') renderDash();
  else if (p === 'daily') renderDaily();
  else if (p === 'files') renderFiles();
  else if (p === 'upload') renderUpload();
  else if (p === 'search') renderSearch();
  else if (p === 'settings') renderSettings();
  else if (p.indexOf('subj-') === 0) renderSubj(p.replace('subj-',''));
  if (window.innerWidth <= 768) document.getElementById('sb').classList.remove('op');
}

// ── DASHBOARD ──
function renderDash() {
  var ch = D.chapters;
  var done = ch.filter(function(c){return c.status==='done';}).length;
  var inp = ch.filter(function(c){return c.status==='inprogress';}).length;
  var pend = ch.filter(function(c){return c.status==='pending';}).length;
  var todD = ch.filter(function(c){return c.doneDate===td();}).length;
  var upP = ch.filter(function(c){return c.status==='done'&&!c.upl;}).length;
  var upl = ch.filter(function(c){return c.upl;}).length;

  var sRows = D.subjects.map(function(s) {
    var sc = ch.filter(function(c){return c.sid===s.id;});
    var sd = sc.filter(function(c){return c.status==='done';}).length;
    var p2 = pct(sd, s.total);
    var cls = p2===100 ? 'dn' : sd>0 ? 'ip' : 'ns2';
    var lbl = p2===100 ? 'Done' : sd>0 ? 'In Progress' : 'Not Started';
    return '<tr><td>' + s.name + '</td>'
      + '<td style="font-size:12px;color:var(--txt3)">' + getFN(s.id) + '</td>'
      + '<td style="text-align:center">' + sd + '</td>'
      + '<td style="text-align:center">' + (s.total-sd) + '</td>'
      + '<td><div style="display:flex;align-items:center;gap:8px">'
      + '<div class="pb" style="flex:1"><div class="pf ' + (p2===100?'g':'a') + '" style="width:' + p2 + '%"></div></div>'
      + '<span style="font-size:12px;color:var(--txt3)">' + p2 + '%</span></div></td>'
      + '<td><span class="tg ' + cls + '">' + lbl + '</span></td></tr>';
  }).join('');

  var rRows = ch.slice().sort(function(a,b){return (b.upAt||'').localeCompare(a.upAt||'');}).slice(0,5).map(function(c) {
    var s = D.subjects.find(function(x){return x.id===c.sid;});
    var st = c.status==='done' ? '<span class="tg dn">Done</span>' : c.status==='inprogress' ? '<span class="tg ip">In Progress</span>' : '<span class="tg pd">Pending</span>';
    return '<tr><td>' + (c.title||'') + '</td>'
      + '<td style="font-size:12px;color:var(--txt3)">' + (s?s.name:'—') + '</td>'
      + '<td>' + st + '</td>'
      + '<td style="font-size:12px">' + fd(c.doneDate) + '</td>'
      + '<td><span class="tg ' + (c.upl?'dn':'pd') + '">' + (c.upl?'Yes':'No') + '</span></td></tr>';
  }).join('');

  document.getElementById('ct').innerHTML =
    '<div class="bn">'
    + '<div><div style="font-family:var(--f2);font-size:13px;color:var(--acc);font-weight:600">' + fd(td()) + '</div>'
    + '<div style="font-size:14px;color:var(--txt2);margin-top:2px">Keep going! You are doing great!</div></div>'
    + '<div class="bn-stats" style="margin-left:auto;display:flex;gap:16px">'
    + '<div style="text-align:center"><div style="font-family:var(--f2);font-size:20px;font-weight:700;color:var(--grn)">' + todD + '</div><div style="font-size:10px;color:var(--txt3)">TODAY</div></div>'
    + '<div style="text-align:center"><div style="font-family:var(--f2);font-size:20px;font-weight:700;color:var(--amb)">' + upP + '</div><div style="font-size:10px;color:var(--txt3)">UPLOAD</div></div>'
    + '<div style="text-align:center"><div style="font-family:var(--f2);font-size:20px;font-weight:700;color:var(--acc)">' + pend + '</div><div style="font-size:10px;color:var(--txt3)">PENDING</div></div>'
    + '</div></div>'
    + '<div class="sg">'
    + '<div class="sc2 b"><div class="sl">Total</div><div class="sv">' + ch.length + '</div></div>'
    + '<div class="sc2 g"><div class="sl">Done</div><div class="sv">' + done + '</div><div class="ss">' + pct(done,ch.length) + '%</div></div>'
    + '<div class="sc2 a"><div class="sl">In Progress</div><div class="sv">' + inp + '</div></div>'
    + '<div class="sc2 r"><div class="sl">Pending</div><div class="sv">' + pend + '</div></div>'
    + '<div class="sc2 p"><div class="sl">Uploaded</div><div class="sv">' + upl + '</div><div class="ss">' + upP + ' pending</div></div>'
    + '</div>'
    + '<div style="background:var(--sur);border:1px solid var(--bor);border-radius:var(--r2);padding:20px;margin-bottom:20px">'
    + '<div class="st">Subject Progress</div>'
    + '<div style="overflow-x:auto"><table class="dt"><thead><tr><th>Subject</th><th>Folder</th><th style="text-align:center">Done</th><th style="text-align:center">Left</th><th>Progress</th><th>Status</th></tr></thead>'
    + '<tbody>' + (sRows||'<tr><td colspan="6" style="text-align:center;color:var(--txt3);padding:24px">Add chapters to see progress!</td></tr>') + '</tbody></table></div></div>'
    + '<div style="background:var(--sur);border:1px solid var(--bor);border-radius:var(--r2);padding:20px">'
    + '<div class="st">Recent Activity</div>'
    + '<div style="overflow-x:auto"><table class="dt"><thead><tr><th>Chapter</th><th>Subject</th><th>Status</th><th>Done On</th><th>Uploaded</th></tr></thead>'
    + '<tbody>' + (rRows||'<tr><td colspan="5" style="text-align:center;color:var(--txt3);padding:24px">No chapters yet!</td></tr>') + '</tbody></table></div></div>';
}

// ── SUBJECT PAGE ──
function renderSubj(id) {
  var subj = D.subjects.find(function(s){return s.id===id;});
  if (!subj) return;
  var ch = D.chapters.filter(function(c){return c.sid===id;});
  var done = ch.filter(function(c){return c.status==='done';}).length;
  var p2 = pct(done, subj.total);
  var types = ['notes','oneliners','mindmaps','mcq','videos'];
  var tlbls = {notes:'Notes',oneliners:'One Liners',mindmaps:'Mind Maps',mcq:'MCQ',videos:'Videos'};
  var pills = types.map(function(t) {
    return '<div class="pl ' + {notes:'nt',oneliners:'ol',mindmaps:'mm',mcq:'mq',videos:'vd'}[t] + '" id="pl-' + t + '" onclick="filterT(\'' + id + '\',\'' + t + '\')">' + tlbls[t] + '</div>';
  }).join('');
  document.getElementById('ct').innerHTML =
    '<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap">'
    + '<div style="width:48px;height:48px;border-radius:12px;background:rgba(91,123,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--acc)">' + subj.icon + '</div>'
    + '<div><h2 style="font-family:var(--f2);font-size:20px;font-weight:700">' + subj.name + '</h2>'
    + '<p style="color:var(--txt3);font-size:13px">' + getFN(id) + ' — ' + subj.total + ' chapters</p></div>'
    + '<div style="margin-left:auto"><button class="btn p" onclick="openAdd(\'' + id + '\')">+ Add Chapter</button></div></div>'
    + '<div class="sg" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">'
    + '<div class="sc2 g"><div class="sl">Done</div><div class="sv">' + done + '</div></div>'
    + '<div class="sc2 a"><div class="sl">Pending</div><div class="sv">' + (subj.total-done) + '</div></div>'
    + '<div class="sc2 b"><div class="sl">Total</div><div class="sv">' + subj.total + '</div></div>'
    + '<div class="sc2 p"><div class="sl">Progress</div><div class="sv">' + p2 + '%</div></div></div>'
    + '<div style="background:var(--sur);border:1px solid var(--bor);border-radius:var(--r2);padding:14px 18px;margin-bottom:14px">'
    + '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;color:var(--txt3)">Progress</span><span style="font-size:13px;font-weight:600;color:var(--acc)">' + p2 + '%</span></div>'
    + '<div class="pb" style="height:10px"><div class="pf ' + (p2===100?'g':'a') + '" style="width:' + p2 + '%"></div></div></div>'
    + '<div class="pr">' + pills + '</div>'
    + '<div style="background:var(--sur);border:1px solid var(--bor);border-radius:var(--r2)">'
    + '<div style="overflow-x:auto"><table class="dt"><thead><tr><th>Chapter</th><th>Status</th><th>Start</th><th>Done On</th><th>Uploaded</th><th>Actions</th></tr></thead>'
    + '<tbody id="cr">' + chapR(ch.filter(function(c){return (c.type||'notes')==='notes';})) + '</tbody></table></div></div>';
  var pEl = document.getElementById('pl-notes');
  if (pEl) pEl.classList.add('act2');
}

function chapR(list) {
  if (!list.length) return '<tr><td colspan="6" style="text-align:center;color:var(--txt3);padding:24px">No chapters here yet.</td></tr>';
  return list.map(function(c) {
    var st = c.status==='done' ? '<span class="tg dn">Done</span>' : c.status==='inprogress' ? '<span class="tg ip">In Progress</span>' : '<span class="tg pd">Pending</span>';
    var notDone = c.status !== 'done' ? '<button class="btn g" style="padding:4px 9px;font-size:11px" data-id="' + c.id + '" onclick="mkDone(this.dataset.id)">Done</button>' : '';
    return '<tr>'
      + '<td style="max-width:160px">' + (c.num?('#'+c.num+' — '):'') + (c.title||'') + '</td>'
      + '<td>' + st + '</td>'
      + '<td style="font-size:12px;color:var(--txt3)">' + fd(c.startDate) + '</td>'
      + '<td style="font-size:12px;color:var(--txt3)">' + fd(c.doneDate) + '</td>'
      + '<td><span class="tg ' + (c.upl?'dn':'pd') + '">' + (c.upl?'Yes':'No') + '</span></td>'
      + '<td><div style="display:flex;gap:5px;flex-wrap:wrap">'
      + '<button class="btn" style="padding:4px 9px;font-size:11px" data-id="' + c.id + '" onclick="editC(this.dataset.id)">Edit</button>'
      + '<button class="btn" style="padding:4px 9px;font-size:11px;color:var(--pur)" data-id="' + c.id + '" data-title="' + esc(c.title||'') + '" onclick="viewF(this.dataset.id,this.dataset.title)">View</button>'
      + notDone
      + '</div></td></tr>';
  }).join('');
}

function filterT(sid, type) {
  document.querySelectorAll('.pl').forEach(function(p){p.classList.remove('act2');});
  var el = document.getElementById('pl-' + type);
  if (el) el.classList.add('act2');
  var ch = D.chapters.filter(function(c){return c.sid===sid && (c.type||'notes')===type;});
  document.getElementById('cr').innerHTML = chapR(ch);
}

// ── ADD/EDIT CHAPTER ──
function openAdd(preSid) {
  if (!D.subjects.length) { showToast('Settings lo subject add cheyandi!'); return; }
  var opts = D.subjects.map(function(s) {
    return '<option value="' + s.id + '"' + (preSid===s.id?' selected':'') + '>' + s.name + ' (' + getFN(s.id) + ')</option>';
  }).join('');
  document.getElementById('mb').innerHTML =
    '<h3>Add Chapter</h3>'
    + '<div class="fr"><div class="fg"><label class="fl">Subject</label><select class="fs" id="f1">' + opts + '</select></div>'
    + '<div class="fg"><label class="fl">Type</label><select class="fs" id="f2">'
    + '<option value="notes">Notes</option><option value="oneliners">One Liners</option>'
    + '<option value="mindmaps">Mind Maps</option><option value="mcq">MCQ</option><option value="videos">Videos</option>'
    + '</select></div></div>'
    + '<div class="fr"><div class="fg"><label class="fl">Chapter No.</label><input class="fi" type="number" id="f3" placeholder="5"></div>'
    + '<div class="fg"><label class="fl">Title</label><input class="fi" type="text" id="f4" placeholder="Chapter name"></div></div>'
    + '<div class="fr"><div class="fg"><label class="fl">Start Date</label><input class="fi" type="date" id="f5" value="' + td() + '"></div>'
    + '<div class="fg"><label class="fl">Status</label><select class="fs" id="f6">'
    + '<option value="pending">Pending</option><option value="inprogress">In Progress</option><option value="done">Done</option>'
    + '</select></div></div>'
    + '<div class="fg"><label class="fl">Notes</label><textarea class="fi" id="f7" rows="2" placeholder="Optional..."></textarea></div>'
    + '<div class="mf"><button class="btn" onclick="closeM()">Cancel</button><button class="btn p" onclick="saveC()">Save</button></div>';
  document.getElementById('ov').style.display = 'flex';
}

function saveC() {
  var title = document.getElementById('f4').value.trim();
  if (!title) { alert('Title enter cheyandi!'); return; }
  var status = document.getElementById('f6').value;
  var c = {
    id: gid(), sid: document.getElementById('f1').value, type: document.getElementById('f2').value,
    num: document.getElementById('f3').value || null, title: title,
    startDate: document.getElementById('f5').value, doneDate: status==='done' ? td() : null,
    status: status, notes: document.getElementById('f7').value, upl: false,
    crAt: new Date().toISOString(), upAt: new Date().toISOString()
  };
  D.chapters.push(c);
  if (status === 'done') D.logs.push({date:td(), cid:c.id, title:title});
  closeM();
  saveData();
  showToast('Chapter saved!');
  if (page.indexOf('subj-') === 0) renderSubj(page.replace('subj-',''));
  else renderDash();
}

function editC(id) {
  var c = D.chapters.find(function(x){return x.id===id;});
  if (!c) return;
  var opts = D.subjects.map(function(s) {
    return '<option value="' + s.id + '"' + (c.sid===s.id?' selected':'') + '>' + s.name + '</option>';
  }).join('');
  var tOpts = ['notes','oneliners','mindmaps','mcq','videos'].map(function(t) {
    return '<option value="' + t + '"' + (c.type===t?' selected':'') + '>' + t + '</option>';
  }).join('');
  document.getElementById('mb').innerHTML =
    '<h3>Edit Chapter</h3>'
    + '<div class="fr"><div class="fg"><label class="fl">Subject</label><select class="fs" id="f1">' + opts + '</select></div>'
    + '<div class="fg"><label class="fl">Type</label><select class="fs" id="f2">' + tOpts + '</select></div></div>'
    + '<div class="fr"><div class="fg"><label class="fl">No.</label><input class="fi" type="number" id="f3" value="' + (c.num||'') + '"></div>'
    + '<div class="fg"><label class="fl">Title</label><input class="fi" type="text" id="f4" value="' + esc(c.title||'') + '"></div></div>'
    + '<div class="fr"><div class="fg"><label class="fl">Start Date</label><input class="fi" type="date" id="f5" value="' + (c.startDate||'') + '"></div>'
    + '<div class="fg"><label class="fl">Done Date</label><input class="fi" type="date" id="f8" value="' + (c.doneDate||'') + '"></div></div>'
    + '<div class="fr"><div class="fg"><label class="fl">Status</label><select class="fs" id="f6">'
    + '<option value="pending"' + (c.status==='pending'?' selected':'') + '>Pending</option>'
    + '<option value="inprogress"' + (c.status==='inprogress'?' selected':'') + '>In Progress</option>'
    + '<option value="done"' + (c.status==='done'?' selected':'') + '>Done</option>'
    + '</select></div>'
    + '<div class="fg"><label class="fl">Uploaded?</label><select class="fs" id="f9">'
    + '<option value="false"' + (!c.upl?' selected':'') + '>Not Uploaded</option>'
    + '<option value="true"' + (c.upl?' selected':'') + '>Uploaded</option>'
    + '</select></div></div>'
    + '<div class="fg"><label class="fl">Notes</label><textarea class="fi" id="f7" rows="2">' + esc(c.notes||'') + '</textarea></div>'
    + '<div class="mf">'
    + '<button class="btn r" data-id="' + id + '" onclick="delC(this.dataset.id)">Delete</button>'
    + '<button class="btn" onclick="closeM()">Cancel</button>'
    + '<button class="btn p" data-id="' + id + '" onclick="updC(this.dataset.id)">Update</button></div>';
  document.getElementById('ov').style.display = 'flex';
}

function updC(id) {
  var c = D.chapters.find(function(x){return x.id===id;});
  if (!c) return;
  var ns = document.getElementById('f6').value;
  var wasD = c.status === 'done';
  c.sid = document.getElementById('f1').value;
  c.type = document.getElementById('f2').value;
  c.num = document.getElementById('f3').value || null;
  c.title = document.getElementById('f4').value;
  c.startDate = document.getElementById('f5').value;
  c.doneDate = document.getElementById('f8').value || (ns==='done' ? td() : null);
  c.status = ns;
  c.notes = document.getElementById('f7').value;
  c.upl = document.getElementById('f9').value === 'true';
  c.upAt = new Date().toISOString();
  if (ns === 'done' && !wasD) D.logs.push({date:td(), cid:id, title:c.title});
  closeM();
  saveData();
  showToast('Updated!');
  if (page.indexOf('subj-') === 0) renderSubj(page.replace('subj-',''));
  else renderDash();
}

function delC(id) {
  if (!confirm('Delete this chapter?')) return;
  D.chapters = D.chapters.filter(function(c){return c.id!==id;});
  closeM();
  saveData();
  showToast('Deleted.');
  if (page.indexOf('subj-') === 0) renderSubj(page.replace('subj-',''));
  else renderDash();
}

function mkDone(id) {
  var c = D.chapters.find(function(x){return x.id===id;});
  if (!c || c.status === 'done') return;
  c.status = 'done';
  c.doneDate = td();
  c.upAt = new Date().toISOString();
  D.logs.push({date:td(), cid:id, title:c.title});

  showToast('Marked done!');

// ── FILE UPLOAD & VIEW ──
function viewF(cid, ctitle) {
  document.getElementById('mb').innerHTML =
    '<h3>' + esc(ctitle) + ' — Files</h3>'
    + '<div style="text-align:center;padding:32px;color:var(--txt3)">Loading files...</div>';
  document.getElementById('ov').style.display = 'flex';
  sb.from('user_files').select('*').eq('chapter_id', cid).order('created_at', {ascending:false}).then(function(r) {
    var files = r.data || [];
    if (!files.length) {
      document.getElementById('mb').innerHTML =
        '<h3>' + esc(ctitle) + ' — Files</h3>'
        + '<div style="text-align:center;padding:32px">'
        + '<div style="font-size:32px;margin-bottom:12px">No files yet</div>'
        + '<button class="btn p" data-cid="' + cid + '" onclick="openUpload(this.dataset.cid)">Upload File</button></div>'
        + '<div class="mf"><button class="btn" onclick="closeM()">Close</button></div>';
      return;
    }
    window._files = files;
    var f = files[0];
    showFileView(f, cid, ctitle, files);
  }).catch(function() {
    document.getElementById('mb').innerHTML =
      '<h3>' + esc(ctitle) + '</h3>'
      + '<div style="text-align:center;color:var(--red);padding:24px">Error loading files. Check Supabase SQL setup.</div>'
      + '<div class="mf"><button class="btn" onclick="closeM()">Close</button></div>';
  });
}

function showFileView(f, cid, ctitle, files) {
  var isHtml = f.file_name && f.file_name.toLowerCase().indexOf('.html') !== -1;
  var fList = files.length > 1 ? '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">'
    + files.map(function(fi,i) {
      return '<button class="btn" style="padding:3px 10px;font-size:11px' + (i===0?';color:var(--acc);border-color:var(--acc)':'') + '" data-fid="' + fi.id + '" data-cid="' + cid + '" data-ct="' + esc(ctitle) + '" onclick="switchF(this.dataset.fid,this.dataset.cid,this.dataset.ct)">' + esc(fi.file_name) + '</button>';
    }).join('') + '</div>' : '';

  var previewArea = '';
  if (isHtml && f.file_content) {
    var blob = new Blob([f.file_content], {type:'text/html;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    previewArea = '<iframe src="' + url + '" style="width:100%;height:480px;border:1px solid var(--bor);border-radius:8px;background:#fff"></iframe>';
  } else if (f.file_content) {
    var dc = f.file_content;
    if (f.file_name && f.file_name.indexOf('.json') !== -1) {
      try { dc = JSON.stringify(JSON.parse(dc), null, 2); } catch(e) {}
    }
    previewArea = '<div class="fp">' + esc(dc) + '</div>';
  }

  document.getElementById('mb').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">'
    + '<h3 style="margin:0">' + esc(f.file_name||'') + '</h3>'
    + '<span style="font-size:11px;color:var(--txt3)">' + files.length + ' file(s)</span></div>'
    + fList
    + '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'
    + (isHtml ? '<button class="btn p" data-fid="' + f.id + '" onclick="showPrev(this.dataset.fid)">Preview</button>' : '')
    + '<button class="btn" data-fid="' + f.id + '" onclick="showRaw(this.dataset.fid)">Raw Code</button>'
    + '<button class="btn g" data-fid="' + f.id + '" onclick="copyF(this.dataset.fid)">Copy Code</button>'
    + '<button class="btn" data-fid="' + f.id + '" onclick="dlF(this.dataset.fid)">Download</button>'
    + '<button class="btn r" data-fid="' + f.id + '" data-cid="' + cid + '" data-ct="' + esc(ctitle) + '" onclick="delF(this.dataset.fid,this.dataset.cid,this.dataset.ct)">Delete</button>'
    + '<button class="btn" style="color:var(--pur)" data-cid="' + cid + '" onclick="openUpload(this.dataset.cid)">Upload More</button>'
    + '</div>'
    + '<div id="fv">' + previewArea + '</div>'
    + '<div class="mf"><button class="btn" onclick="closeM()">Close</button></div>';
  window._curFile = f;
}

function switchF(fid, cid, ctitle) {
  var f = (window._files||[]).find(function(x){return x.id===fid;});
  if (!f) return;
  window._curFile = f;
  showFileView(f, cid, ctitle, window._files||[]);
}

function showPrev(fid) {
  var f = (window._files||[]).find(function(x){return x.id===fid;})||window._curFile;
  if (!f || !f.file_content) return;
  var blob = new Blob([f.file_content], {type:'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  document.getElementById('fv').innerHTML = '<iframe src="' + url + '" style="width:100%;height:480px;border:1px solid var(--bor);border-radius:8px;background:#fff"></iframe>';
}

function showRaw(fid) {
  var f = (window._files||[]).find(function(x){return x.id===fid;})||window._curFile;
  if (!f) return;
  document.getElementById('fv').innerHTML = '<div class="fp">' + esc(f.file_content||'') + '</div>';
}

function copyF(fid) {
  var f = (window._files||[]).find(function(x){return x.id===fid;})||window._curFile;
  if (!f || !f.file_content) { showToast('No content!'); return; }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(f.file_content).then(function(){ showToast('Copied!'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = f.file_content;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied!');
  }
}

function dlF(fid) {
  var f = (window._files||[]).find(function(x){return x.id===fid;})||window._curFile;
  if (!f) return;
  var blob = new Blob([f.file_content||''], {type:f.file_type||'text/plain'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = f.file_name || 'file.txt';
  a.click();
}

function delF(fid, cid, ctitle) {
  if (!confirm('Delete this file?')) return;
  sb.from('user_files').delete().eq('id', fid).then(function(r) {
    if (r.error) { showToast('Delete failed!'); return; }
    showToast('File deleted!');
    viewF(cid, ctitle);
  });
}

function openUpload(cid) {
  document.getElementById('mb').innerHTML =
    '<h3>Upload File</h3>'
    + '<div style="border:2px dashed var(--bor2);border-radius:var(--r2);padding:32px;text-align:center;cursor:pointer" onclick="document.getElementById(\'fu\').click()">'
    + '<div style="font-size:40px;margin-bottom:12px">+</div>'
    + '<p style="color:var(--txt3)">Click to select file (HTML, CSS, JS, JSON, TXT)</p>'
    + '<p id="fn" style="color:var(--acc);margin-top:8px;font-size:13px;font-weight:600"></p>'
    + '</div>'
    + '<input type="file" id="fu" style="display:none" accept=".html,.css,.js,.json,.txt,.md" onchange="fileSelected(this,\'' + cid + '\')">'
    + '<div class="mf"><button class="btn" onclick="closeM()">Cancel</button><button class="btn p" id="ubtn" onclick="doUpload(\'' + cid + '\')" disabled>Upload</button></div>';
  document.getElementById('ov').style.display = 'flex';
  PF = null;
}

function fileSelected(inp, cid) {
  var file = inp.files[0];
  if (!file) return;
  document.getElementById('fn').textContent = file.name;
  document.getElementById('ubtn').disabled = false;
  var reader = new FileReader();
  reader.onload = function(e) { PF = {name:file.name, type:file.type||'text/plain', content:e.target.result}; };
  if (file.name.match(/\.(html|css|js|json|txt|md)$/i)) reader.readAsText(file);
  else reader.readAsDataURL(file);
}

function doUpload(cid) {
  if (!PF) return;
  var btn = document.getElementById('ubtn');
  btn.textContent = 'Uploading...';
  btn.disabled = true;
  sb.from('user_files').insert({
    id: gid(), user_id: uid, chapter_id: cid,
    file_name: PF.name, file_type: PF.type, file_content: PF.content,
    created_at: new Date().toISOString()
  }).then(function(r) {
    if (r.error) { showToast('Upload failed: ' + r.error.message); btn.textContent = 'Upload'; btn.disabled = false; return; }
    closeM();
    showToast('File uploaded!');
    PF = null;
  });
}

function updTotal(sid, val) {
  var s = D.subjects.find(function(x){return x.id===sid;});
  if (!s) return;
  var n = parseInt(val);
  if (!n || n < 1) return;
  s.total = n;
  saveData();
  showToast('Updated: ' + s.name);
  buildTree();
}

function delSubj(sid) {
  var s = D.subjects.find(function(x){return x.id===sid;});
  if (!s) return;
  var cc = D.chapters.filter(function(c){return c.sid===sid;}).length;
  if (!confirm('Delete "' + s.name + '"?' + (cc>0 ? ' '+cc+' chapters will also be deleted!' : ''))) return;
  D.subjects = D.subjects.filter(function(x){return x.id!==sid;});
  D.chapters = D.chapters.filter(function(c){return c.sid!==sid;});
  saveData();
  showToast('Subject deleted!');
  buildTree();
  renderSettings();
}

function delFolder(fid) {
  var f = D.folders.find(function(x){return x.id===fid;});
  if (!f) return;
  var subs = D.subfolders.filter(function(sf){return sf.parentId===fid;});
  var subIds = subs.map(function(sf){return sf.id;});
  var subjs = D.subjects.filter(function(s){return subIds.indexOf(s.sfId)!==-1;});
  var subjIds = subjs.map(function(s){return s.id;});
  var cc = D.chapters.filter(function(c){return subjIds.indexOf(c.sid)!==-1;}).length;
  if (!confirm('Delete folder "' + f.name + '"? This removes ' + subs.length + ' subfolders, ' + subjs.length + ' subjects and ' + cc + ' chapters!')) return;
  D.folders = D.folders.filter(function(x){return x.id!==fid;});
  D.subfolders = D.subfolders.filter(function(sf){return sf.parentId!==fid;});
  D.subjects = D.subjects.filter(function(s){return subIds.indexOf(s.sfId)===-1;});
  D.chapters = D.chapters.filter(function(c){return subjIds.indexOf(c.sid)===-1;});
  saveData();
  showToast('Folder deleted!');
  buildTree();
  renderSettings();
}

function addSubj() {
  var name = document.getElementById('nsn').value.trim();
  if (!name) { alert('Name enter cheyandi'); return; }
  var sfid = document.getElementById('nssf').value;
  if (!sfid) { alert('Folder select cheyandi'); return; }
  var icon = document.getElementById('nsi').value || name.charAt(0).toUpperCase();
  var total = parseInt(document.getElementById('nst').value) || 10;
  D.subjects.push({id:gid(), sfId:sfid, name:name, icon:icon, total:total});
  saveData();
  showToast('Subject added: ' + name);
  buildTree();
  renderSettings();
}

function addFolder2() {
  var name = document.getElementById('nfn').value.trim();
  if (!name) { alert('Name enter cheyandi'); return; }
  var id = name.toLowerCase().replace(/\s+/g, '-');
  if (D.folders.find(function(f){return f.id===id;})) { alert('Already exists!'); return; }
  D.folders.push({id:id, name:name, icon:name.charAt(0)});
  D.subfolders.push({id:id+'-syl', parentId:id, name:'Syllabus'});
  D.subfolders.push({id:id+'-fnd', parentId:id, name:'Foundation Course'});
  saveData();
  showToast('Folder added: ' + name);
  buildTree();
  renderSettings();
}

function bkDrive() {
  expJSON();
  setTimeout(function() {
    window.open('https://drive.google.com/drive/my-drive', '_blank');
    localStorage.setItem(BK, new Date().toISOString());
    showToast('Downloaded! Drive lo upload cheyandi');

function expJSON() {
  var b = new Blob([JSON.stringify(D, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'Vibhillion_' + td() + '.json';
  a.click();
}

// ── MODAL & TOAST ──
function closeM() { document.getElementById('ov').style.display = 'none'; PF = null; }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'flex';
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.style.display = 'none'; }, 3000);
}
